<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPrint 执行报告仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body { font-family: 'Microsoft YaHei', '微软雅黑', Arial, sans-serif; background: #f0f4f8; color: #333; }
  .header { background: linear-gradient(135deg, #002FA7, #00C3FF); color: white; padding: 24px 32px; }
  .header h1 { font-size: 24px; font-weight: 600; }
  .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .kpi-row { display: flex; gap: 16px; padding: 20px 32px; flex-wrap: wrap; }
  .kpi-card { flex: 1; min-width: 180px; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .kpi-label { font-size: 13px; color: #666; margin-bottom: 8px; }
  .kpi-value { font-size: 32px; font-weight: 700; }
  .kpi-sub { font-size: 12px; color: #999; margin-top: 4px; }
  .color-total { color: #002FA7; }
  .color-success { color: #10b981; }
  .color-fail { color: #ef4444; }
  .color-duration { color: #f59e0b; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 32px 20px; }
  .chart-box { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .chart-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1e293b; }
  .full-width { grid-column: 1 / -1; }
  .fail-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .fail-table th, .fail-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
  .fail-table th { background: #f8fafc; font-weight: 600; color: #475569; }
  .badge-fail { background: #fef2f2; color: #ef4444; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .badge-ok { background: #f0fdf4; color: #10b981; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .loading { text-align: center; padding: 60px; color: #666; }
  .error { text-align: center; padding: 60px; color: #ef4444; }
  @media (max-width: 900px) { .charts { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <h1>🖨️ AutoPrint 自动打印执行报告</h1>
  <p id="reportPeriod">加载中...</p>
</div>

<div class="kpi-row" id="kpiRow">
  <div class="loading">正在加载数据...</div>
</div>

<div class="charts" id="chartsSection" style="display:none;">
  <div class="chart-box full-width">
    <h3>📈 每日打印量趋势（总数 / 成功 / 失败）</h3>
    <canvas id="chartTrend"></canvas>
  </div>
  <div class="chart-box">
    <h3>📊 每日成功率（%）</h3>
    <canvas id="chartSuccessRate"></canvas>
  </div>
  <div class="chart-box">
    <h3>⏱️ 平均执行耗时（分钟）</h3>
    <canvas id="chartDuration"></canvas>
  </div>
  <div class="chart-box full-width">
    <h3>❌ 失败记录明细</h3>
    <div id="failTableContainer"></div>
  </div>
</div>

<div class="error" id="errorSection" style="display:none;"></div>

<script>
const SUPABASE_URL = 'https://uvqjtvonxwsmhntnyest.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWp0dm9ueHdzbWhudG55ZXN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzE5ODMsImV4cCI6MjA5NzQ0Nzk4M30.mBlPq2xNuHROdT39FQ6cw9t8U6IqrjyWl8IqbRo8QOE';

async function fetchData() {
  const resp = await fetch(
    `${SUPABASE_URL}/rest/v1/ReportAutoPrint?select=*&order=执行时间.asc`,
    { headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` } }
  );
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

function groupByDate(records) {
  const map = {};
  records.forEach(r => {
    if (!r['执行时间']) return;
    const date = new Date(r['执行时间']).toISOString().slice(0, 10);
    if (!map[date]) map[date] = { total: 0, success: 0, fail: 0, skip: 0, durationSum: 0, durationCount: 0, failures: [] };
    map[date].total += r['总数'] || 0;
    map[date].success += r['成功'] || 0;
    map[date].fail += r['失败'] || 0;
    map[date].skip += r['跳过'] || 0;
    if (r['耗时分钟'] != null) {
      map[date].durationSum += r['耗时分钟'];
      map[date].durationCount += 1;
    }
    if (r['失败'] > 0) {
      map[date].failures.push({
        time: r['执行时间'],
        title: r['Title'] || '',
        total: r['总数'],
        fail: r['失败']
      });
    }
  });
  return map;
}

function renderKPI(records, grouped) {
  const dates = Object.keys(grouped).sort();
  const totalPrint = records.reduce((s, r) => s + (r['总数'] || 0), 0);
  const totalSuccess = records.reduce((s, r) => s + (r['成功'] || 0), 0);
  const totalFail = records.reduce((s, r) => s + (r['失败'] || 0), 0);
  const successRate = totalPrint > 0 ? ((totalSuccess / totalPrint) * 100).toFixed(1) : '0.0';
  
  let totalDuration = 0, durationCount = 0;
  records.forEach(r => { if (r['耗时分钟'] != null) { totalDuration += r['耗时分钟']; durationCount++; } });
  const avgDuration = durationCount > 0 ? (totalDuration / durationCount).toFixed(1) : '0.0';

  document.getElementById('reportPeriod').textContent = 
    `报告周期：${dates[0] || '--'} - ${dates[dates.length - 1] || '--'} | 共 ${records.length} 条执行记录`;

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">📦 总打印量</div>
      <div class="kpi-value color-total">${totalPrint}</div>
      <div class="kpi-sub">全周期累计执行总数</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">✅ 成功数量</div>
      <div class="kpi-value color-success">${totalSuccess}</div>
      <div class="kpi-sub">成功率 ${successRate}%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">❌ 失败数量</div>
      <div class="kpi-value color-fail">${totalFail}</div>
      <div class="kpi-sub">失败率 ${totalPrint > 0 ? ((totalFail / totalPrint) * 100).toFixed(1) : 0}%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">⏱️ 平均耗时</div>
      <div class="kpi-value color-duration">${avgDuration}</div>
      <div class="kpi-sub">分钟/每次执行</div>
    </div>
  `;
}

function renderCharts(grouped) {
  const dates = Object.keys(grouped).sort();
  const labels = dates;
  const dailyTotal = dates.map(d => grouped[d].total);
  const dailySuccess = dates.map(d => grouped[d].success);
  const dailyFailed = dates.map(d => grouped[d].fail);
  const dailySkip = dates.map(d => grouped[d].skip);
  const successRate = dates.map(d => grouped[d].total > 0 ? +((grouped[d].success / grouped[d].total) * 100).toFixed(1) : 0);
  const dailyDuration = dates.map(d => grouped[d].durationCount > 0 ? +(grouped[d].durationSum / grouped[d].durationCount).toFixed(1) : 0);

  new Chart(document.getElementById('chartTrend'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '失败', data: dailyFailed, backgroundColor: '#ef4444', stack: 'stack1' },
        { label: '跳过', data: dailySkip, backgroundColor: '#f59e0b', stack: 'stack1' },
        { label: '成功', data: dailySuccess, backgroundColor: '#10b981', stack: 'stack1' }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } },
      scales: { x: { ticks: { maxRotation: 45 } }, y: { beginAtZero: true, title: { display: true, text: '打印数量' } } }
    }
  });

  new Chart(document.getElementById('chartSuccessRate'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: '成功率 (%)',
        data: successRate,
        borderColor: '#002FA7',
        backgroundColor: 'rgba(0,47,167,0.1)',
        fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#002FA7'
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { min: 0, max: 100, title: { display: true, text: '成功率 (%)' } } }
    }
  });

  new Chart(document.getElementById('chartDuration'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '平均耗时 (分钟)',
        data: dailyDuration,
        backgroundColor: '#00C3FF',
        borderRadius: 4
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, title: { display: true, text: '分钟' } } }
    }
  });
}

function renderFailTable(grouped) {
  const dates = Object.keys(grouped).sort();
  let rows = '';
  dates.forEach(date => {
    grouped[date].failures.forEach(f => {
      rows += `<tr>
        <td>${new Date(f.time).toLocaleString('zh-CN')}</td>
        <td>${f.title}</td>
        <td>${f.total}</td>
        <td><span class="badge-fail">${f.fail}</span></td>
        <td>失败</td>
      </tr>`;
    });
  });
  if (!rows) rows = '<tr><td colspan="5" style="text-align:center;color:#10b981;">暂无失败记录 ✅</td></tr>';
  document.getElementById('failTableContainer').innerHTML = `<table class="fail-table">
    <tr><th>执行时间</th><th>标题</th><th>总数</th><th>失败数</th><th>状态</th></tr>
    ${rows}</table>`;
}

async function main() {
  try {
    const records = await fetchData();
    if (!records.length) throw new Error('Supabase 中暂无数据');
    const grouped = groupByDate(records);
    document.getElementById('chartsSection').style.display = 'grid';
    renderKPI(records, grouped);
    renderCharts(grouped);
    renderFailTable(grouped);
  } catch (err) {
    document.getElementById('kpiRow').innerHTML = '';
    document.getElementById('errorSection').style.display = 'block';
    document.getElementById('errorSection').innerHTML = 
      `❌ 数据加载失败：<br>${err.message}<br><small>请检查 Supabase 连接或 RLS 策略配置</small>`;
    console.error(err);
  }
}

main();
</script>
</body>
</html>
