<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoPrint 执行报告仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body { font-family: 'Microsoft YaHei', '微软雅黑', Arial, sans-serif; background: #f0f4f8; color: #333; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #002FA7, #00C3FF); color: white; padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
  .header h1 { font-size: 24px; font-weight: 600; }
  .header p { font-size: 14px; opacity: 0.85; margin-top: 4px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-email { font-size: 13px; opacity: 0.9; }
  .btn-logout { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-logout:hover { background: rgba(255,255,255,0.35); }
  .btn-manage { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .btn-manage:hover { background: rgba(255,255,255,0.35); }

  /* Login Page */
  #loginPage { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #002FA7 0%, #00C3FF 100%); }
  .login-card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
  .login-card h2 { text-align: center; color: #002FA7; margin-bottom: 8px; font-size: 22px; }
  .login-card .subtitle { text-align: center; color: #64748b; font-size: 14px; margin-bottom: 28px; }
  .login-card label { display: block; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 6px; }
  .login-card input[type="email"],
  .login-card input[type="password"] { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
  .login-card input:focus { border-color: #002FA7; box-shadow: 0 0 0 3px rgba(0,47,167,0.1); }
  .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg, #002FA7, #00C3FF); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { width: 100%; padding: 12px; background: white; color: #002FA7; border: 1px solid #002FA7; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: background 0.2s; }
  .btn-secondary:hover { background: #f0f4ff; }
  .divider { text-align: center; color: #94a3b8; font-size: 12px; margin: 16px 0; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #e2e8f0; }
  .divider::before { left: 0; }
  .divider::after { right: 0; }
  .error-msg { background: #fef2f2; color: #ef4444; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }
  .success-msg { background: #f0fdf4; color: #10b981; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }
  .info-msg { background: #eff6ff; color: #002FA7; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; display: none; }

  /* Pending approval page */
  #pendingPage { display: none; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #002FA7 0%, #00C3FF 100%); }
  .pending-card { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); text-align: center; }
  .pending-card .icon { font-size: 48px; margin-bottom: 16px; }
  .pending-card h2 { color: #002FA7; margin-bottom: 12px; }
  .pending-card p { color: #64748b; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }

  /* Dashboard */
  #dashboardPage { display: none; }
  .filter-row { display: flex; gap: 12px; padding: 16px 32px; align-items: center; flex-wrap: wrap; background: white; margin: 0 32px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .filter-row label { font-size: 13px; font-weight: 600; color: #475569; }
  .filter-row input[type="date"] { padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; }
  .btn-filter { padding: 8px 16px; background: #002FA7; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-filter:hover { background: #001f8a; }
  .btn-reset { padding: 8px 16px; background: white; color: #002FA7; border: 1px solid #002FA7; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .btn-reset:hover { background: #f0f4ff; }
  .kpi-row { display: flex; gap: 20px; padding: 24px 32px; flex-wrap: wrap; }
  .kpi-card { flex: 1; min-width: 200px; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); position: relative; overflow: hidden; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s; cursor: default; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 16px 16px 0 0; }
  .kpi-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.12); }
  .kpi-card.card-total::before { background: linear-gradient(90deg, #002FA7, #00C3FF); }
  .kpi-card.card-success::before { background: linear-gradient(90deg, #10b981, #34d399); }
  .kpi-card.card-fail::before { background: linear-gradient(90deg, #ef4444, #f87171); }
  .kpi-card.card-duration::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
  .kpi-icon { font-size: 32px; margin-bottom: 12px; display: block; }
  .kpi-label { font-size: 13px; color: #64748b; margin-bottom: 8px; font-weight: 500; letter-spacing: 0.3px; }
  .kpi-value { font-size: 38px; font-weight: 700; line-height: 1.1; margin-bottom: 8px; font-variant-numeric: tabular-nums; }
  .kpi-sub { font-size: 12px; color: #94a3b8; }
  .kpi-trend { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-top: 8px; }
  .kpi-trend.up { background: #ecfdf5; color: #10b981; }
  .kpi-trend.down { background: #fef2f2; color: #ef4444; }
  .color-total { color: #002FA7; }
  .color-success { color: #10b981; }
  .color-fail { color: #ef4444; }
  .color-duration { color: #f59e0b; }
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 32px 20px; }
  .chart-box { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .chart-box h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1e293b; }
  .full-width { grid-column: 1 / -1; }
  .fail-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
  .fail-table th, .fail-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
  .fail-table th { background: #f8fafc; font-weight: 600; color: #475569; }
  .badge-fail { background: #fef2f2; color: #ef4444; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .badge-ok { background: #f0fdf4; color: #10b981; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
  .loading { text-align: center; padding: 60px; color: #666; }
  @media (max-width: 900px) { .charts { grid-template-columns: 1fr; } .header { flex-direction: column; align-items: flex-start; gap: 10px; } .filter-row { margin: 0 16px; } }

  /* User Management Page */
  #userManagePage { display: none; padding: 32px; }
  .user-table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
  .user-table th, .user-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
  .user-table th { background: #f8fafc; font-weight: 600; color: #475569; }
  .btn-approve { padding: 6px 12px; background: #10b981; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-approve:hover { background: #059669; }
  .btn-reject { padding: 6px 12px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; margin-left: 8px; }
  .btn-reject:hover { background: #dc2626; }
  .btn-back { padding: 8px 16px; background: white; color: #002FA7; border: 1px solid #002FA7; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; margin-bottom: 20px; }
  .btn-back:hover { background: #f0f4ff; }
  .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .status-pending { background: #fef3c7; color: #d97706; }
  .status-approved { background: #d1fae5; color: #059669; }
  .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; z-index: 1000; display: none; }
  .toast-success { background: #d1fae5; color: #059669; border: 1px solid #10b981; }
  .toast-error { background: #fee2e2; color: #dc2626; border: 1px solid #ef4444; }
</style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage">
  <div class="login-card">
    <h2>🖨️ AutoPrint 看板</h2>
    <p class="subtitle">自动打印执行报告仪表盘</p>
    <div class="error-msg" id="loginError"></div>
    <div class="success-msg" id="loginSuccess"></div>
    <div class="info-msg" id="loginInfo"></div>
    <form id="loginForm">
      <label>邮箱地址</label>
      <input type="email" id="loginEmail" placeholder="you@company.com" required>
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="请输入密码" required>
      <button type="submit" class="btn-primary">登录</button>
    </form>
    <div class="divider">或</div>
    <button class="btn-secondary" id="magicLinkBtn">发送魔法链接登录（免密码）</button>
    <div class="divider">没有账号？</div>
    <button class="btn-secondary" id="signupBtn">申请注册账号</button>
  </div>
</div>

<!-- Pending Approval Page -->
<div id="pendingPage">
  <div class="pending-card">
    <div class="icon">⏳</div>
    <h2>等待管理员批准</h2>
    <p>您的注册申请已提交，正在等待管理员审批。<br>审批通过后即可登录使用。<br><br>如有疑问，请联系系统管理员。</p>
    <button class="btn-secondary" onclick="logout()">返回登录页</button>
  </div>
</div>

<!-- Dashboard Page -->
<div id="dashboardPage">
  <div class="header">
    <div>
      <h1>🖨️ AutoPrint 自动打印执行报告</h1>
      <p id="reportPeriod">加载中...</p>
    </div>
    <div class="header-right">
      <button class="btn-manage" id="btnManage" style="display:none;" onclick="showUserManage()">👥 用户管理</button>
      <span class="user-email" id="userEmail"></span>
      <button class="btn-logout" onclick="logout()">退出登录</button>
    </div>
  </div>
  
  <!-- Date Filter -->
  <div class="filter-row">
    <label>开始日期：</label>
    <input type="date" id="startDate">
    <label>结束日期：</label>
    <input type="date" id="endDate">
    <button class="btn-filter" onclick="applyFilter()">筛选</button>
    <button class="btn-reset" onclick="resetFilter()">重置</button>
  </div>
  
  <div class="kpi-row" id="kpiRow">
    <div class="loading">正在加载数据...</div>
  </div>
  <div class="charts" id="chartsSection" style="display:none;">
    <div class="chart-box full-width">
      <h3>📈 每日打印量趋势（总数 / 成功 / 失败）</h3>
      <canvas id="chartTrend"></canvas>
    </div>
    <div class="chart-box">
      <h3>📊 每日成功率（%）</h3>
      <canvas id="chartSuccessRate"></canvas>
    </div>
    <div class="chart-box">
      <h3>⏱️ 平均执行耗时（分钟）</h3>
      <canvas id="chartDuration"></canvas>
    </div>
    <div class="chart-box full-width">
      <h3>❌ 失败记录明细</h3>
      <div id="failTableContainer"></div>
    </div>
  </div>
</div>

<!-- User Management Page -->
<div id="userManagePage">
  <button class="btn-back" onclick="backToDashboard()">← 返回仪表盘</button>
  <h2 style="margin-bottom: 20px; color: #002FA7;">👥 用户审批管理</h2>
  <table class="user-table" id="userTable">
    <thead>
      <tr>
        <th>邮箱</th>
        <th>角色</th>
        <th>注册时间</th>
        <th>状态</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="userTableBody">
      <tr><td colspan="5" style="text-align:center; padding:40px; color:#666;">加载中...</td></tr>
    </tbody>
  </table>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://uvqjtvonxwsmhntnyest.supabase.co';
const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV2cWp0dm9ueHdzbWhudG55ZXN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NzE5ODMsImV4cCI6MjA5NzQ0Nzk4M30.mBlPq2xNuHROdT39FQ6cw9t8U6IqrjyWl8IqbRo8QOE';

const supabase = window.supabase.createClient(SUPABASE_URL, ANON_KEY);

let currentUser = null;
let currentUserData = null;
let charts = {};

// ===================== AUTH STATE =====================

supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) checkApproval(session.user);
  else showLogin();
});

supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) checkApproval(session.user);
  if (event === 'SIGNED_OUT') showLogin();
});

async function checkApproval(user) {
  currentUser = user;
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .single();
  
  if (error || !data) {
    await new Promise(r => setTimeout(r, 1500));
    const { data: retry, error: err2 } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', user.id)
      .single();
    if (err2 || !retry) { showPending(user.email); return; }
    currentUserData = retry;
    if (!retry.approved) { showPending(user.email); return; }
  } else {
    currentUserData = data;
    if (!data.approved) { showPending(user.email); return; }
  }
  
  // Check if admin
  if (currentUserData.role === 'admin') {
    document.getElementById('btnManage').style.display = 'block';
  }
  
  showDashboard(user);
}

function showLogin() {
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('pendingPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'none';
  document.getElementById('userManagePage').style.display = 'none';
}

function showPending(email) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('pendingPage').style.display = 'flex';
  document.getElementById('dashboardPage').style.display = 'none';
  document.getElementById('userManagePage').style.display = 'none';
}

function showDashboard(user) {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('pendingPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'block';
  document.getElementById('userManagePage').style.display = 'none';
  document.getElementById('userEmail').textContent = user.email || '';
  loadData();
}

function showUserManage() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('pendingPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'none';
  document.getElementById('userManagePage').style.display = 'block';
  loadUsers();
}

function backToDashboard() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('pendingPage').style.display = 'none';
  document.getElementById('dashboardPage').style.display = 'block';
  document.getElementById('userManagePage').style.display = 'none';
}

async function logout() {
  await supabase.auth.signOut();
}

// ===================== LOGIN FORM =====================

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMessages();
  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById('loginEmail').value,
    password: document.getElementById('loginPassword').value,
  });
  if (error) showError(error.message);
});

document.getElementById('magicLinkBtn').addEventListener('click', async () => {
  hideMessages();
  const email = document.getElementById('loginEmail').value;
  if (!email) { showError('请输入邮箱地址'); return; }
  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.origin }
  });
  if (error) showError(error.message);
  else showSuccess('✉️ 魔法链接已发送到你的邮箱，请查收并点击链接登录');
});

document.getElementById('signupBtn').addEventListener('click', async () => {
  hideMessages();
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) { showError('请输入邮箱和密码'); return; }
  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: { emailRedirectTo: window.location.origin }
  });
  if (error) showError(error.message);
  else {
    if (data.session) {
      showInfo('✅ 注册成功！正在检查审批状态...');
      setTimeout(() => checkApproval(data.user), 2000);
    } else {
      showSuccess('✅ 注册申请已提交！等待管理员审批后即可登录。');
    }
  }
});

function showError(msg) {
  const el = document.getElementById('loginError');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('loginSuccess').style.display = 'none';
  document.getElementById('loginInfo').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('loginSuccess');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginInfo').style.display = 'none';
}
function showInfo(msg) {
  const el = document.getElementById('loginInfo');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginSuccess').style.display = 'none';
}
function hideMessages() {
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginSuccess').style.display = 'none';
  document.getElementById('loginInfo').style.display = 'none';
}

// ===================== DATE FILTER =====================

function applyFilter() {
  const startDate = document.getElementById('startDate').value;
  const endDate = document.getElementById('endDate').value;
  if (!startDate && !endDate) {
    showToast('请选择开始或结束日期', 'error');
    return;
  }
  loadData(startDate, endDate);
}

function resetFilter() {
  document.getElementById('startDate').value = '';
  document.getElementById('endDate').value = '';
  loadData();
}

// ===================== DATA LOADING =====================

async function loadData(startDate, endDate) {
  let query = supabase
    .from('ReportAutoPrint')
    .select('*')
    .order('执行时间', { ascending: true });
  
  if (startDate) {
    query = query.gte('执行时间', startDate + 'T00:00:00');
  }
  if (endDate) {
    query = query.lte('执行时间', endDate + 'T23:59:59');
  }
  
  const { data, error } = await query;
  
  if (error) {
    document.getElementById('kpiRow').innerHTML = '';
    alert('数据加载失败：' + error.message);
    return;
  }
  if (!data || !data.length) {
    document.getElementById('kpiRow').innerHTML = '<div style="padding:40px;color:#666;">暂无数据</div>';
    document.getElementById('chartsSection').style.display = 'none';
    return;
  }
  render(data, startDate, endDate);
}

function groupByDate(records) {
  const map = {};
  records.forEach(r => {
    if (!r['执行时间']) return;
    const date = new Date(r['执行时间']).toISOString().slice(0, 10);
    if (!map[date]) map[date] = { total: 0, success: 0, fail: 0, skip: 0, durationSum: 0, durationCount: 0, failures: [] };
    map[date].total += r['总数'] || 0;
    map[date].success += r['成功'] || 0;
    map[date].fail += r['失败'] || 0;
    map[date].skip += r['跳过'] || 0;
    if (r['耗时分钟'] != null) { map[date].durationSum += r['耗时分钟']; map[date].durationCount += 1; }
    if (r['失败'] > 0) map[date].failures.push({ time: r['执行时间'], title: r['Title'] || '', total: r['总数'], fail: r['失败'] });
  });
  return map;
}

function render(records, startDate, endDate) {
  const grouped = groupByDate(records);
  const dates = Object.keys(grouped).sort();
  const totalPrint = records.reduce((s, r) => s + (r['总数'] || 0), 0);
  const totalSuccess = records.reduce((s, r) => s + (r['成功'] || 0), 0);
  const totalFail = records.reduce((s, r) => s + (r['失败'] || 0), 0);
  const successRate = totalPrint > 0 ? ((totalSuccess / totalPrint) * 100).toFixed(1) : '0.0';
  let totalDuration = 0, durationCount = 0;
  records.forEach(r => { if (r['耗时分钟'] != null) { totalDuration += r['耗时分钟']; durationCount++; } });
  const avgDuration = durationCount > 0 ? (totalDuration / durationCount).toFixed(1) : '0.0';

  let periodText = '报告周期：';
  if (startDate && endDate) {
    periodText += `${startDate} 至 ${endDate}`;
  } else if (startDate) {
    periodText += `${startDate} 至今`;
  } else if (endDate) {
    periodText += `截至 ${endDate}`;
  } else {
    periodText += `${dates[0] || '--'} - ${dates[dates.length - 1] || '--'}`;
  }
  periodText += ` | 共 ${records.length} 条执行记录`;
  
  document.getElementById('reportPeriod').textContent = periodText;

  document.getElementById('kpiRow').innerHTML = `
    <div class="kpi-card card-total">
      <span class="kpi-icon">📦</span>
      <div class="kpi-label">总打印量</div>
      <div class="kpi-value color-total" data-target="${totalPrint}">0</div>
      <div class="kpi-sub">筛选累计执行总数</div>
      ${getTrendBadge(records, 'total')}
    </div>
    <div class="kpi-card card-success">
      <span class="kpi-icon">✅</span>
      <div class="kpi-label">成功数量</div>
      <div class="kpi-value color-success" data-target="${totalSuccess}">0</div>
      <div class="kpi-sub">成功率 ${successRate}%</div>
      ${getTrendBadge(records, 'success')}
    </div>
    <div class="kpi-card card-fail">
      <span class="kpi-icon">❌</span>
      <div class="kpi-label">失败数量</div>
      <div class="kpi-value color-fail" data-target="${totalFail}">0</div>
      <div class="kpi-sub">失败率 ${totalPrint > 0 ? ((totalFail / totalPrint) * 100).toFixed(1) : 0}%</div>
      ${getTrendBadge(records, 'fail')}
    </div>
    <div class="kpi-card card-duration">
      <span class="kpi-icon">⏱️</span>
      <div class="kpi-label">平均耗时</div>
      <div class="kpi-value color-duration" data-target="${avgDuration}">0</div>
      <div class="kpi-sub">分钟/每次执行</div>
      ${getTrendBadge(records, 'duration')}
    </div>
  `;
  
  // Trigger count-up animation
  setTimeout(() => animateKpiValues(), 100);

  document.getElementById('chartsSection').style.display = 'grid';
  renderCharts(grouped);
  renderFailTable(grouped);
}

function renderCharts(grouped) {
  const dates = Object.keys(grouped).sort();
  const dailyFailed = dates.map(d => grouped[d].fail);
  const dailySkip = dates.map(d => grouped[d].skip);
  const dailySuccess = dates.map(d => grouped[d].success);
  const successRate = dates.map(d => grouped[d].total > 0 ? +((grouped[d].success / grouped[d].total) * 100).toFixed(1) : 0);
  const dailyDuration = dates.map(d => grouped[d].durationCount > 0 ? +(grouped[d].durationSum / grouped[d].durationCount).toFixed(1) : 0);

  // Destroy existing charts
  if (charts.trend) charts.trend.destroy();
  if (charts.successRate) charts.successRate.destroy();
  if (charts.duration) charts.duration.destroy();

  charts.trend = new Chart(document.getElementById('chartTrend'), {
    type: 'bar', data: { labels: dates, datasets: [
      { label: '失败', data: dailyFailed, backgroundColor: '#ef4444', stack: 'stack1' },
      { label: '跳过', data: dailySkip, backgroundColor: '#f59e0b', stack: 'stack1' },
      { label: '成功', data: dailySuccess, backgroundColor: '#10b981', stack: 'stack1' }
    ]},
    options: { responsive: true, plugins: { legend: { position: 'top' } }, scales: { x: { ticks: { maxRotation: 45 } }, y: { beginAtZero: true } } }
  });
  charts.successRate = new Chart(document.getElementById('chartSuccessRate'), {
    type: 'line', data: { labels: dates, datasets: [{ label: '成功率 (%)', data: successRate, borderColor: '#002FA7', backgroundColor: 'rgba(0,47,167,0.1)', fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#002FA7' }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { min: 0, max: 100 } } }
  });
  charts.duration = new Chart(document.getElementById('chartDuration'), {
    type: 'bar', data: { labels: dates, datasets: [{ label: '平均耗时', data: dailyDuration, backgroundColor: '#00C3FF', borderRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });
}

function renderFailTable(grouped) {
  const dates = Object.keys(grouped).sort();
  let rows = '';
  dates.forEach(date => {
    grouped[date].failures.forEach(f => {
      rows += `<tr><td>${new Date(f.time).toLocaleString('zh-CN')}</td><td>${f.title}</td><td>${f.total}</td><td><span class="badge-fail">${f.fail}</span></td><td>失败</td></tr>`;
    });
  });
  if (!rows) rows = '<tr><td colspan="5" style="text-align:center;color:#10b981;">暂无失败记录 ✅</td></tr>';
  document.getElementById('failTableContainer').innerHTML = `<table class="fail-table"><tr><th>执行时间</th><th>标题</th><th>总数</th><th>失败数</th><th>状态</th></tr>${rows}</table>`;
}

// ===================== KPI ANIMATION =====================

function animateKpiValues() {
  const kpiValues = document.querySelectorAll('.kpi-value[data-target]');
  kpiValues.forEach(el => {
    const target = parseFloat(el.getAttribute('data-target')) || 0;
    const isFloat = target % 1 !== 0;
    const duration = 1200;
    const startTime = performance.now();
    
    function update(currentTime) {
      const elapsed = currentTime - startTime;
      const progress = Math.min(elapsed / duration, 1);
      // Ease out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = eased * target;
      
      el.textContent = isFloat ? current.toFixed(1) : Math.floor(current).toLocaleString();
      
      if (progress < 1) {
        requestAnimationFrame(update);
      } else {
        el.textContent = isFloat ? target.toFixed(1) : target.toLocaleString();
      }
    }
    
    requestAnimationFrame(update);
  });
}

function getTrendBadge(records, type) {
  if (!records || records.length < 2) return '';
  
  // Split records into first half and second half
  const mid = Math.floor(records.length / 2);
  const firstHalf = records.slice(0, mid);
  const secondHalf = records.slice(mid);
  
  let firstVal = 0, secondVal = 0;
  
  if (type === 'total') {
    firstVal = firstHalf.reduce((s, r) => s + (r['总数'] || 0), 0);
    secondVal = secondHalf.reduce((s, r) => s + (r['总数'] || 0), 0);
  } else if (type === 'success') {
    firstVal = firstHalf.reduce((s, r) => s + (r['成功'] || 0), 0);
    secondVal = secondHalf.reduce((s, r) => s + (r['成功'] || 0), 0);
  } else if (type === 'fail') {
    firstVal = firstHalf.reduce((s, r) => s + (r['失败'] || 0), 0);
    secondVal = secondHalf.reduce((s, r) => s + (r['失败'] || 0), 0);
  } else if (type === 'duration') {
    const firstDurations = firstHalf.filter(r => r['耗时分钟'] != null).map(r => r['耗时分钟']);
    const secondDurations = secondHalf.filter(r => r['耗时分钟'] != null).map(r => r['耗时分钟']);
    firstVal = firstDurations.length > 0 ? firstDurations.reduce((a, b) => a + b, 0) / firstDurations.length : 0;
    secondVal = secondDurations.length > 0 ? secondDurations.reduce((a, b) => a + b, 0) / secondDurations.length : 0;
  }
  
  if (firstVal === 0 && secondVal === 0) return '';
  
  const change = firstVal === 0 ? 100 : ((secondVal - firstVal) / firstVal * 100);
  const isPositive = type === 'fail' || type === 'duration' ? change < 0 : change > 0;
  const isUp = change > 0;
  
  const arrow = isUp ? '↑' : '↓';
  const colorClass = isPositive ? 'up' : 'down';
  
  return `<div class="kpi-trend ${colorClass}">${arrow} ${Math.abs(change).toFixed(1)}%</div>`;
}

// ===================== USER MANAGEMENT =====================

async function loadUsers() {
  const tbody = document.getElementById('userTableBody');
  tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:#666;">加载中...</td></tr>';
  
  // Use RPC function (SECURITY DEFINER) to bypass RLS for admins
  const { data, error } = await supabase.rpc('get_all_profiles');
  
  if (error) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:40px; color:#ef4444;">加载失败：${error.message}</td></tr>`;
    return;
  }
  
  if (!data || !data.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:#666;">暂无用户</td></tr>';
    return;
  }
  
  tbody.innerHTML = '';
  data.forEach(user => {
    const tr = document.createElement('tr');
    const statusBadge = user.approved 
      ? '<span class="status-badge status-approved">已批准</span>'
      : '<span class="status-badge status-pending">待审批</span>';
    const actions = user.approved
      ? '<span style="color:#10b981; font-weight:600;">✅ 已批准</span>'
      : `<button class="btn-approve" onclick="approveUser('${user.id}', '${user.email}')">批准</button><button class="btn-reject" onclick="rejectUser('${user.id}', '${user.email}')">拒绝</button>`;
    
    tr.innerHTML = `
      <td>${user.email}</td>
      <td>${user.role || 'viewer'}</td>
      <td>${user.created_at ? new Date(user.created_at).toLocaleString('zh-CN') : '--'}</td>
      <td>${statusBadge}</td>
      <td>${actions}</td>
    `;
    tbody.appendChild(tr);
  });
}

async function approveUser(userId, email) {
  if (!confirm(`确定要批准用户 ${email} 吗？`)) return;
  
  // Use RPC function (SECURITY DEFINER) for admin approval
  const { error } = await supabase.rpc('approve_user', {
    target_user_id: userId,
    approve: true
  });
  
  if (error) {
    showToast('批准失败：' + error.message, 'error');
  } else {
    showToast('✅ 已批准用户 ' + email, 'success');
    loadUsers();
  }
}

async function rejectUser(userId, email) {
  if (!confirm(`确定要拒绝用户 ${email} 吗？此操作将标记该用户为未批准状态。`)) return;
  
  // Use RPC function (SECURITY DEFINER) for admin rejection
  const { error } = await supabase.rpc('approve_user', {
    target_user_id: userId,
    approve: false
  });
  
  if (error) {
    showToast('操作失败：' + error.message, 'error');
  } else {
    showToast('⚠️ 已拒绝用户 ' + email, 'error');
    loadUsers();
  }
}

// ===================== TOAST NOTIFICATION =====================

function showToast(message, type) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast toast-' + type;
  toast.style.display = 'block';
  
  setTimeout(() => {
    toast.style.display = 'none';
  }, 3000);
}
